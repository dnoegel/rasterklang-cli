name: Build binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.artifact }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: rasterklang-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: rasterklang-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: rasterklang-macos-amd64
          - goos: darwin
            goarch: arm64
            artifact: rasterklang-macos-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${ARTIFACT}" ./cmd/rasterklang
          chmod +x "dist/${ARTIFACT}"
          tar -C dist -czf "dist/${ARTIFACT}.tar.gz" "${ARTIFACT}"
          (cd dist && sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256")

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30
